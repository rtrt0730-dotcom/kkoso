<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="개인 업무 관리 및 데이터 분석 플랫폼">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icon-192.svg">
  <link rel="apple-touch-icon" href="/icon-192.svg">
  <title>Kim Secretary Dashboard</title>
  <style>
    :root { --bg: #0d0f14; --surface: #161b24; --text: #e2e8f0; --accent: #818cf8; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Malgun Gothic', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 600px; padding: 40px; text-align: center; }
    h1 { font-size: 32px; margin-bottom: 30px; color: var(--accent); letter-spacing: 2px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 40px; }
    .card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 24px;
      text-decoration: none;
      color: var(--text);
      transition: all .3s;
      cursor: pointer;
    }
    .card:hover { background: rgba(129,140,248,0.1); border-color: var(--accent); transform: translateY(-4px); }
    .card-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .card-desc { font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 Kim Secretary</h1>
    <p style="color:#94a3b8;margin-bottom:40px">업무 관리 & 분석 대시보드</p>

    <div class="grid">
      <a href="2-체험용-샘플/업무대시보드.html" class="card">
        <div class="card-title">📅 업무 대시보드</div>
        <div class="card-desc">할 일, 일정, 매출 현황</div>
      </a>
      <a href="2-체험용-샘플/매출보고서.html" class="card">
        <div class="card-title">💰 매출 보고서</div>
        <div class="card-desc">제품별·지역별 분석</div>
      </a>
      <a href="2-체험용-샘플/subtrac-분석보고서.html" class="card">
        <div class="card-title">🔍 SubTrackr 분석</div>
        <div class="card-desc">구독 관리 서비스 분석</div>
      </a>
      <a href="2-체험용-샘플/mbis-분석보고서.html" class="card">
        <div class="card-title">💡 MBIS 분석</div>
        <div class="card-desc">조명 브랜드 웹사이트 분석</div>
      </a>
    </div>
  </div>

  <script>
    // Service Worker 등록 (PWA 활성화)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => {
            console.log('✅ Service Worker 등록됨:', reg);
          })
          .catch(err => {
            console.log('⚠️ Service Worker 등록 실패:', err);
          });
      });
    }
  </script>
</body>
</html>
